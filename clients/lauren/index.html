<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lauren Farkas</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #fff; }
        canvas { position: absolute; top: 0; left: 0; cursor: grab; }
        canvas.panning { cursor: grabbing; }

        .loading-overlay {
            position: fixed; inset: 0; background: #fff; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; gap: 20px; transition: opacity 0.6s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .compass-wrap { position: relative; width: 48px; height: 48px; }
        .compass-ring, .compass-needle {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }
        .compass-needle {
            animation: needle 2s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            will-change: transform;
        }
        @keyframes needle {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(380deg); }
            50% { transform: rotate(355deg); }
            60% { transform: rotate(365deg); }
            70% { transform: rotate(358deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-text { color: #bbb; font-size: 12px; letter-spacing: 0.5px; }

        .empty-state {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #aaa; font-size: 15px;
        }

        .edit-link {
            position: fixed; bottom: 16px; right: 16px; z-index: 10;
            color: #bbb; font-size: 12px; text-decoration: none;
            padding: 4px 10px; border-radius: 4px; background: rgba(0,0,0,0.04);
            transition: color 0.2s, background 0.2s;
        }
        .edit-link:hover { color: #666; background: rgba(0,0,0,0.08); }

        .reset-btn {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            width: 28px; height: 28px; border: none; border-radius: 4px;
            background: rgba(0,0,0,0.04); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: rgba(0,0,0,0.08); }
        .reset-btn svg { width: 14px; height: 14px; }

        .dive-track {
            position: fixed; top: 40px; bottom: 40px; right: 12px; width: 3px;
            background: rgba(0,0,0,0.06); border-radius: 2px; z-index: 10;
            pointer-events: none;
        }
        .dive-pip {
            position: absolute; top: 0; left: -2px; width: 7px; height: 7px;
            background: #5a9; border-radius: 50%;
        }

        .dive-hint {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #aaa; font-size: 13px; z-index: 10;
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .dive-hint.visible { opacity: 1; }
        .dive-hint span { animation: hintBounce 2s ease-in-out infinite; display: inline-block; }
        @keyframes hintBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="compass-wrap">
            <svg class="compass-ring" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="22" stroke="#ddd" stroke-width="1.5"/>
                <line x1="24" y1="2" x2="24" y2="8" stroke="#ccc" stroke-width="1"/>
                <line x1="24" y1="40" x2="24" y2="46" stroke="#ccc" stroke-width="1"/>
                <line x1="2" y1="24" x2="8" y2="24" stroke="#ccc" stroke-width="1"/>
                <line x1="40" y1="24" x2="46" y2="24" stroke="#ccc" stroke-width="1"/>
                <circle cx="24" cy="24" r="2.5" fill="#999"/>
            </svg>
            <svg class="compass-needle" viewBox="0 0 48 48" fill="none">
                <polygon points="24,8 21.5,24 26.5,24" fill="#c44"/>
                <polygon points="24,40 21.5,24 26.5,24" fill="#bbb"/>
            </svg>
        </div>
        <div class="progress-text" id="progressText"></div>
    </div>

    <canvas id="mainCanvas"></canvas>
    <button class="reset-btn" id="resetBtn" title="Reset view"><svg viewBox="0 0 16 16" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"><path d="M2 2h4M2 2v4M14 14h-4M14 14v-4M14 2h-4M14 2v4M2 14h4M2 14v-4"/></svg></button>
    <div class="dive-track" id="diveTrack"><div class="dive-pip" id="divePip"></div></div>
    <div class="dive-hint" id="diveHint"><span>Scroll to dive</span></div>
    <a class="edit-link" id="editLink" href="/editor">Edit</a>

    <script>
    (function() {
        // Hide editor link on public-facing subdomain
        if (location.hostname !== 'lauren.farkas.design') {
            document.getElementById('editLink').style.display = 'none';
        }

        var CANVAS_W = 28800;
        var CANVAS_H = 16200;
        var MAX_PREVIEW_DIM = 4000;

        var mainCanvas = document.getElementById('mainCanvas');
        var ctx = mainCanvas.getContext('2d');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var progressText = document.getElementById('progressText');
        var resetBtn = document.getElementById('resetBtn');
        var diveTrack = document.getElementById('diveTrack');
        var divePip = document.getElementById('divePip');
        var diveHint = document.getElementById('diveHint');

        var layers = [];
        var images = {};
        var processedCanvases = {};

        // Viewport (current + animation targets)
        var viewX = 0, viewY = 0, viewZoom = 0.04;
        var targetViewX = 0, targetViewY = 0, targetZoom = 0.04;
        var animating = false;
        var VIEW_LERP = 0.1;

        // Pan state
        var isPanning = false;
        var panStartX = 0, panStartY = 0, panStartViewX = 0, panStartViewY = 0;

        // Dive state
        var scrollProgress = 0, targetScroll = 0;
        var diveSorted = [], diveLayerCount = 0;
        var SCROLL_LERP = 0.08, SCROLL_SENSITIVITY = 0.003, TOUCH_SENSITIVITY = 0.008;
        var diveTouchLastY = 0;
        var diveHintShown = false;
        var homeX = 0, homeY = 0;

        function resizeCanvas() {
            mainCanvas.width = window.innerWidth * devicePixelRatio;
            mainCanvas.height = window.innerHeight * devicePixelRatio;
            mainCanvas.style.width = window.innerWidth + 'px';
            mainCanvas.style.height = window.innerHeight + 'px';
        }

        // Content bounds (computed after layers load)
        // Full bounds (desktop) and core bounds (mobile — excludes outlier layers)
        var contentCX = CANVAS_W / 2, contentCY = CANVAS_H / 2;
        var contentW = CANVAS_W, contentH = CANVAS_H;
        var coreCX = contentCX, coreCY = contentCY;
        var coreW = contentW, coreH = contentH;

        function computeContentBounds() {
            var visible = layers.filter(function(l) { return l.visible; });
            if (!visible.length) return;
            var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            var x1s = [], x2s = [], y1s = [], y2s = [];
            visible.forEach(function(l) {
                var img = images[l.id];
                if (!img) return;
                var lx2 = l.x + img.naturalWidth * l.scale;
                var ly2 = l.y + img.naturalHeight * l.scale;
                if (l.x < minX) minX = l.x;
                if (l.y < minY) minY = l.y;
                if (lx2 > maxX) maxX = lx2;
                if (ly2 > maxY) maxY = ly2;
                x1s.push(l.x); x2s.push(lx2);
                y1s.push(l.y); y2s.push(ly2);
            });
            contentCX = (minX + maxX) / 2;
            contentCY = (minY + maxY) / 2;
            contentW = maxX - minX;
            contentH = maxY - minY;

            // Core bounds: 10th/90th percentile edges (excludes outlier layers)
            var ns = function(a, b) { return a - b; };
            x1s.sort(ns); x2s.sort(ns); y1s.sort(ns); y2s.sort(ns);
            var n = x1s.length;
            if (n >= 5) {
                var lo = Math.floor(n * 0.1);
                var hi = Math.min(n - 1, Math.floor(n * 0.9));
                coreW = x2s[hi] - x1s[lo];
                coreH = y2s[hi] - y1s[lo];
                coreCX = (x1s[lo] + x2s[hi]) / 2;
                coreCY = (y1s[lo] + y2s[hi]) / 2;
            } else {
                coreW = contentW; coreH = contentH;
                coreCX = contentCX; coreCY = contentCY;
            }
        }

        var VIEW_NUDGE_X = 0.015;
        var VIEW_NUDGE_Y = -0.06;

        function calcFit() {
            var portrait = window.innerHeight > window.innerWidth * 1.2;
            var w = portrait ? coreW : contentW;
            var h = portrait ? coreH : contentH;
            var cx = portrait ? coreCX : contentCX;
            var cy = portrait ? coreCY : contentCY;
            var scaleX = window.innerWidth / w;
            var scaleY = window.innerHeight / h;
            var zoom = Math.min(scaleX, scaleY) * (portrait ? 0.92 : 1.18);
            var nx = portrait ? 0 : VIEW_NUDGE_X;
            var ny = portrait ? -0.02 : VIEW_NUDGE_Y;
            var vx = window.innerWidth / 2 - cx * zoom + window.innerWidth * nx;
            var vy = window.innerHeight / 2 - cy * zoom + window.innerHeight * ny;
            return { zoom: zoom, x: vx, y: vy };
        }

        function fitView() {
            var f = calcFit();
            viewZoom = f.zoom; viewX = f.x; viewY = f.y;
        }

        function resetView() {
            targetScroll = 0;
            var f = calcFit();
            targetZoom = f.zoom;
            targetViewX = f.x;
            targetViewY = f.y;
            homeX = f.x;
            homeY = f.y;
            animating = true;
        }

        // ---- Image processing (same logic as editor) ----
        function getProcessedCanvas(layer) {
            var cached = processedCanvases[layer.id];
            if (cached && cached.threshold === layer.threshold && cached.bgMode === layer.bgMode && cached.feather === (layer.feather || 0)) {
                return cached.canvas;
            }

            var srcImg = images[layer.id];
            if (!srcImg) return null;

            var w = srcImg.naturalWidth, h = srcImg.naturalHeight;
            if (Math.max(w, h) > MAX_PREVIEW_DIM) {
                var ratio = MAX_PREVIEW_DIM / Math.max(w, h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }

            var offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            var octx = offscreen.getContext('2d');
            octx.drawImage(srcImg, 0, 0, w, h);

            var needPixelOps = (layer.bgMode === 'threshold') || ((layer.feather || 0) > 0);
            if (needPixelOps) {
                var imageData = octx.getImageData(0, 0, w, h);
                var data = imageData.data;

                if (layer.bgMode === 'threshold') {
                    var bg = layer.bgColor || [255, 255, 255];
                    var thresh = layer.threshold;
                    for (var i = 0; i < data.length; i += 4) {
                        var dr = data[i] - bg[0];
                        var dg = data[i+1] - bg[1];
                        var db = data[i+2] - bg[2];
                        var dist = Math.sqrt(dr*dr + dg*dg + db*db);
                        if (dist < thresh) {
                            var alpha = dist < thresh * 0.6 ? 0 : Math.round(255 * (dist - thresh * 0.6) / (thresh * 0.4));
                            data[i+3] = alpha;
                        }
                    }
                }

                var feather = layer.feather || 0;
                if (feather > 0) {
                    var effectiveFeather = feather * (w / srcImg.naturalWidth);
                    if (effectiveFeather > 0.5) {
                        for (var j = 0; j < data.length; j += 4) {
                            var px = (j / 4) % w;
                            var py = Math.floor((j / 4) / w);
                            var edgeDist = Math.min(px, py, w - 1 - px, h - 1 - py);
                            if (edgeDist < effectiveFeather) {
                                data[j+3] = Math.round(data[j+3] * (edgeDist / effectiveFeather));
                            }
                        }
                    }
                }

                octx.putImageData(imageData, 0, 0);
            }

            processedCanvases[layer.id] = { canvas: offscreen, threshold: layer.threshold, bgMode: layer.bgMode, feather: layer.feather || 0 };
            return offscreen;
        }

        // ---- Rendering ----
        function render() {
            var w = mainCanvas.width;
            var h = mainCanvas.height;
            var dpr = devicePixelRatio;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // Base transform uses home position (parallax pan applied per-layer)
            ctx.setTransform(viewZoom * dpr, 0, 0, viewZoom * dpr, homeX * dpr, homeY * dpr);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            // Perspective anchor = viewport center in canvas coordinates
            var centerX = (window.innerWidth / 2 - homeX) / viewZoom;
            var centerY = (window.innerHeight / 2 - homeY) / viewZoom;

            // Pan offset in canvas units — closer layers shift more
            var panCX = (viewX - homeX) / viewZoom;
            var panCY = (viewY - homeY) / viewZoom;

            // Draw back-to-front (diveSorted is top-first, so reverse)
            for (var i = diveSorted.length - 1; i >= 0; i--) {
                var layer = diveSorted[i];

                // Each layer sits at depth (i+1). Camera at scrollProgress.
                var layerZ = i + 1;
                var relZ = layerZ - scrollProgress;

                if (relZ <= 0.05) continue; // behind camera

                var processed = getProcessedCanvas(layer);
                if (!processed) continue;

                var img = images[layer.id];
                if (!img) continue;

                // Perspective: closer layers scale up, normalized so
                // at scroll=0 every layer has scaleMultiplier=1
                var scaleMultiplier = layerZ / relZ;

                var opacity = layer.opacity;
                if (relZ < 0.4) {
                    opacity *= relZ / 0.4;
                }

                ctx.save();
                ctx.globalAlpha = opacity;

                // Perspective zoom from center + parallax pan
                ctx.translate(centerX + panCX * scaleMultiplier, centerY + panCY * scaleMultiplier);
                ctx.scale(scaleMultiplier, scaleMultiplier);
                ctx.translate(-centerX, -centerY);

                var drawW = img.naturalWidth * layer.scale;
                var drawH = img.naturalHeight * layer.scale;

                if (layer.rotation) {
                    var cx = layer.x + drawW / 2;
                    var cy = layer.y + drawH / 2;
                    ctx.translate(cx, cy);
                    ctx.rotate(layer.rotation * Math.PI / 180);
                    ctx.drawImage(processed, -drawW / 2, -drawH / 2, drawW, drawH);
                } else {
                    ctx.drawImage(processed, layer.x, layer.y, drawW, drawH);
                }
                ctx.restore();
            }
        }

        function renderLoop() {
            scrollProgress += (targetScroll - scrollProgress) * SCROLL_LERP;

            if (animating) {
                viewX += (targetViewX - viewX) * VIEW_LERP;
                viewY += (targetViewY - viewY) * VIEW_LERP;
                viewZoom += (targetZoom - viewZoom) * VIEW_LERP;
                if (Math.abs(viewX - targetViewX) < 0.5 && Math.abs(viewY - targetViewY) < 0.5 && Math.abs(viewZoom - targetZoom) < 0.0001) {
                    viewX = targetViewX; viewY = targetViewY; viewZoom = targetZoom;
                    animating = false;
                }
            }

            var pct = diveLayerCount > 0 ? Math.max(0, Math.min(1, scrollProgress / diveLayerCount)) : 0;
            divePip.style.top = (pct * 100) + '%';

            if (!diveHintShown && Math.abs(targetScroll) > 0.05) {
                diveHintShown = true;
                diveHint.classList.remove('visible');
            }

            render();
            requestAnimationFrame(renderLoop);
        }

        // ---- Interaction ----
        mainCanvas.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            animating = false;
            isPanning = true;
            panStartX = e.clientX; panStartY = e.clientY;
            panStartViewX = viewX; panStartViewY = viewY;
            mainCanvas.classList.add('panning');
        });

        window.addEventListener('mousemove', function(e) {
            if (!isPanning) return;
            viewX = panStartViewX + (e.clientX - panStartX);
            viewY = panStartViewY + (e.clientY - panStartY);
        });

        window.addEventListener('mouseup', function() {
            isPanning = false;
            mainCanvas.classList.remove('panning');
        });

        mainCanvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (e.ctrlKey) {
                // Pinch-to-zoom
                var mx = e.clientX, my = e.clientY;
                var zoomFactor = e.deltaY < 0 ? 1.03 : 1 / 1.03;
                var newZoom = Math.max(0.002, Math.min(10, viewZoom * zoomFactor));
                var r = newZoom / viewZoom;
                viewX = mx - (mx - viewX) * r;
                viewY = my - (my - viewY) * r;
                homeX = mx - (mx - homeX) * r;
                homeY = my - (my - homeY) * r;
                viewZoom = newZoom;
            } else {
                // Scroll drives dive depth
                targetScroll = Math.max(0, Math.min(diveLayerCount, targetScroll + e.deltaY * SCROLL_SENSITIVITY));
            }
        }, { passive: false });

        // Touch: single-finger scrolls depth, two-finger pans + zooms
        mainCanvas.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                diveTouchLastY = e.touches[0].clientY;
                isPanning = false;
            } else if (e.touches.length === 2) {
                isPanning = true;
                var dx = e.touches[1].clientX - e.touches[0].clientX;
                var dy = e.touches[1].clientY - e.touches[0].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                panStartViewX = viewX;
                panStartViewY = viewY;
            }
        }, { passive: true });

        mainCanvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                // Single finger: scroll dive depth
                var deltaY = diveTouchLastY - e.touches[0].clientY;
                diveTouchLastY = e.touches[0].clientY;
                targetScroll = Math.max(0, Math.min(diveLayerCount, targetScroll + deltaY * TOUCH_SENSITIVITY));
            } else if (e.touches.length === 2) {
                var dx = e.touches[1].clientX - e.touches[0].clientX;
                var dy = e.touches[1].clientY - e.touches[0].clientY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                if (lastTouchDist > 0) {
                    var rawScale = dist / lastTouchDist;
                    var scale = 1 + (rawScale - 1) * 0.4;
                    var newZoom = Math.max(0.002, Math.min(10, viewZoom * scale));
                    var r = newZoom / viewZoom;
                    viewX = midX - (midX - viewX) * r;
                    viewY = midY - (midY - viewY) * r;
                    homeX = midX - (midX - homeX) * r;
                    homeY = midY - (midY - homeY) * r;
                    viewZoom = newZoom;
                }

                // Two-finger pan
                viewX += midX - lastTouchMidX;
                viewY += midY - lastTouchMidY;

                lastTouchDist = dist;
                lastTouchMidX = midX;
                lastTouchMidY = midY;
            }
        }, { passive: false });

        mainCanvas.addEventListener('touchend', function() {
            isPanning = false;
            diveTouchLastY = 0;
            lastTouchDist = 0;
        }, { passive: true });

        // Double-click to reset
        mainCanvas.addEventListener('dblclick', resetView);

        // Touch: lastTouchDist for pinch
        var lastTouchDist = 0;
        var lastTouchMidX = 0, lastTouchMidY = 0;

        resetBtn.addEventListener('click', resetView);

        window.addEventListener('resize', function() {
            resizeCanvas();
            fitView();
            homeX = viewX;
            homeY = viewY;
        });

        // Keyboard controls
        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                targetScroll = Math.min(diveLayerCount, targetScroll + 0.5);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                targetScroll = Math.max(0, targetScroll - 0.5);
            } else if (e.key === 'Home') {
                resetView();
            } else if (e.key === 'End') {
                targetScroll = diveLayerCount;
            }
        });

        // ---- Load and start ----
        function loadImage(src) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.onload = function() { resolve(img); };
                img.onerror = function() { resolve(null); };
                img.src = src;
            });
        }

        // Load images in batches to avoid saturating mobile connections
        function loadAllImages(layerList, onProgress) {
            var BATCH = 6;
            var idx = 0;
            function nextBatch() {
                if (idx >= layerList.length) return Promise.resolve();
                var batch = layerList.slice(idx, idx + BATCH);
                idx += BATCH;
                return Promise.all(batch.map(function(layer) {
                    var src = layer.uploaded ? ('/' + layer.filename) : ('originals/' + layer.filename);
                    return loadImage(src).then(function(img) {
                        if (img) images[layer.id] = img;
                        onProgress();
                    });
                })).then(nextBatch);
            }
            return nextBatch();
        }

        function init() {
            resizeCanvas();

            fetch('/api/composition').then(function(resp) {
                if (!resp.ok) return null;
                return resp.json();
            }).then(function(data) {
                if (!data || !data.layers || !data.layers.length) {
                    loadingOverlay.classList.add('hidden');
                    var empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.textContent = 'No composition published yet';
                    document.body.appendChild(empty);
                    return;
                }

                layers = data.layers.filter(function(l) { return l.visible; });
                var total = layers.length;
                var loaded = 0;

                function tick() {
                    loaded++;
                    progressText.textContent = loaded + ' / ' + total;
                }

                loadAllImages(layers, tick).then(function() {
                    computeContentBounds();
                    diveSorted = layers.filter(function(l) { return l.visible; })
                        .sort(function(a, b) { return b.zIndex - a.zIndex; });
                    diveLayerCount = diveSorted.length;

                    fitView();
                    homeX = viewX;
                    homeY = viewY;
                    loadingOverlay.classList.add('hidden');
                    diveHint.classList.add('visible');
                    renderLoop();
                });
            }).catch(function() {
                loadingOverlay.classList.add('hidden');
                var empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'Failed to load composition';
                document.body.appendChild(empty);
            });
        }

        init();
    })();
    </script>
</body>
</html>
