<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lauren Farkas</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #fff; }
        canvas { position: absolute; top: 0; left: 0; cursor: grab; }
        canvas.panning { cursor: grabbing; }

        .loading-overlay {
            position: fixed; inset: 0; background: #fff; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; gap: 16px; transition: opacity 0.4s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .progress-bar { width: 300px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #5a9; border-radius: 2px; transition: width 0.2s; width: 0; }
        .progress-text { color: #aaa; font-size: 13px; }

        .empty-state {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #aaa; font-size: 15px;
        }

        .edit-link {
            position: fixed; bottom: 16px; right: 16px; z-index: 10;
            color: #bbb; font-size: 12px; text-decoration: none;
            padding: 4px 10px; border-radius: 4px; background: rgba(0,0,0,0.04);
            transition: color 0.2s, background 0.2s;
        }
        .edit-link:hover { color: #666; background: rgba(0,0,0,0.08); }

        .reset-btn {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            width: 28px; height: 28px; border: none; border-radius: 4px;
            background: rgba(0,0,0,0.04); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: rgba(0,0,0,0.08); }
        .reset-btn svg { width: 14px; height: 14px; }

        .dive-track {
            position: fixed; top: 40px; bottom: 40px; right: 12px; width: 3px;
            background: rgba(0,0,0,0.06); border-radius: 2px; z-index: 10;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .dive-track.visible { opacity: 1; }
        .dive-pip {
            position: absolute; top: 0; left: -2px; width: 7px; height: 7px;
            background: #5a9; border-radius: 50%;
        }

        .dive-hint {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            color: #aaa; font-size: 13px; z-index: 10;
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .dive-hint.visible { opacity: 1; }
        .dive-hint span { animation: hintBounce 2s ease-in-out infinite; display: inline-block; }
        @keyframes hintBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        canvas.dive-mode { cursor: grab; }
        canvas.dive-mode.panning { cursor: grabbing; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div style="color: #999; font-size: 14px;">Loading composition...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText"></div>
    </div>

    <canvas id="mainCanvas"></canvas>
    <button class="reset-btn" id="resetBtn" title="Reset view"><svg viewBox="0 0 16 16" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"><path d="M2 2h4M2 2v4M14 14h-4M14 14v-4M14 2h-4M14 2v4M2 14h4M2 14v-4"/></svg></button>
    <div class="dive-track" id="diveTrack"><div class="dive-pip" id="divePip"></div></div>
    <div class="dive-hint" id="diveHint"><span>Scroll to begin</span></div>
    <a class="edit-link" href="/editor">Edit</a>

    <script>
    (function() {
        var CANVAS_W = 28800;
        var CANVAS_H = 16200;
        var MAX_PREVIEW_DIM = 2000;

        var mainCanvas = document.getElementById('mainCanvas');
        var ctx = mainCanvas.getContext('2d');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var progressFill = document.getElementById('progressFill');
        var progressText = document.getElementById('progressText');
        var resetBtn = document.getElementById('resetBtn');
        var diveTrack = document.getElementById('diveTrack');
        var divePip = document.getElementById('divePip');
        var diveHint = document.getElementById('diveHint');

        var layers = [];
        var images = {};
        var transparentImages = {};
        var processedCanvases = {};

        // Viewport
        var viewX = 0, viewY = 0, viewZoom = 0.04;

        // Pan state
        var isPanning = false;
        var panStartX = 0, panStartY = 0, panStartViewX = 0, panStartViewY = 0;

        // Touch state
        var lastTouchDist = 0;
        var lastTouchMidX = 0, lastTouchMidY = 0;

        // Dive mode state
        var diveMode = false;
        var scrollProgress = 0, targetScroll = 0;
        var diveSorted = [], diveLayerCount = 0;
        var SCROLL_LERP = 0.08, SCROLL_SENSITIVITY = 0.003, TOUCH_SENSITIVITY = 0.008;
        var diveTouchLastY = 0;
        var diveHintShown = false;
        var diveHomeX = 0, diveHomeY = 0;

        function resizeCanvas() {
            mainCanvas.width = window.innerWidth * devicePixelRatio;
            mainCanvas.height = window.innerHeight * devicePixelRatio;
            mainCanvas.style.width = window.innerWidth + 'px';
            mainCanvas.style.height = window.innerHeight + 'px';
        }

        function fitView() {
            var scaleX = window.innerWidth / CANVAS_W;
            var scaleY = window.innerHeight / CANVAS_H;
            viewZoom = Math.min(scaleX, scaleY) * 0.92;
            viewX = (window.innerWidth - CANVAS_W * viewZoom) / 2;
            viewY = (window.innerHeight - CANVAS_H * viewZoom) / 2;
        }

        // ---- Image processing (same logic as editor) ----
        function getProcessedCanvas(layer) {
            var cached = processedCanvases[layer.id];
            if (cached && cached.threshold === layer.threshold && cached.bgMode === layer.bgMode && cached.feather === (layer.feather || 0)) {
                return cached.canvas;
            }

            var srcImg;
            if (layer.bgMode === 'ai' && transparentImages[layer.id]) {
                srcImg = transparentImages[layer.id];
            } else {
                srcImg = images[layer.id];
            }
            if (!srcImg) return null;

            var w = srcImg.naturalWidth, h = srcImg.naturalHeight;
            if (Math.max(w, h) > MAX_PREVIEW_DIM) {
                var ratio = MAX_PREVIEW_DIM / Math.max(w, h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }

            var offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            var octx = offscreen.getContext('2d');
            octx.drawImage(srcImg, 0, 0, w, h);

            var needPixelOps = (layer.bgMode === 'threshold') || ((layer.feather || 0) > 0);
            if (needPixelOps) {
                var imageData = octx.getImageData(0, 0, w, h);
                var data = imageData.data;

                if (layer.bgMode === 'threshold') {
                    var bg = layer.bgColor || [255, 255, 255];
                    var thresh = layer.threshold;
                    for (var i = 0; i < data.length; i += 4) {
                        var dr = data[i] - bg[0];
                        var dg = data[i+1] - bg[1];
                        var db = data[i+2] - bg[2];
                        var dist = Math.sqrt(dr*dr + dg*dg + db*db);
                        if (dist < thresh) {
                            var alpha = dist < thresh * 0.6 ? 0 : Math.round(255 * (dist - thresh * 0.6) / (thresh * 0.4));
                            data[i+3] = alpha;
                        }
                    }
                }

                var feather = layer.feather || 0;
                if (feather > 0) {
                    var effectiveFeather = feather * (w / srcImg.naturalWidth);
                    if (effectiveFeather > 0.5) {
                        for (var j = 0; j < data.length; j += 4) {
                            var px = (j / 4) % w;
                            var py = Math.floor((j / 4) / w);
                            var edgeDist = Math.min(px, py, w - 1 - px, h - 1 - py);
                            if (edgeDist < effectiveFeather) {
                                data[j+3] = Math.round(data[j+3] * (edgeDist / effectiveFeather));
                            }
                        }
                    }
                }

                octx.putImageData(imageData, 0, 0);
            }

            processedCanvases[layer.id] = { canvas: offscreen, threshold: layer.threshold, bgMode: layer.bgMode, feather: layer.feather || 0 };
            return offscreen;
        }

        // ---- Dive mode ----
        function enterDiveMode() {
            diveMode = true;
            diveSorted = layers.filter(function(l) { return l.visible; })
                .sort(function(a, b) { return b.zIndex - a.zIndex; });
            diveLayerCount = diveSorted.length;
            scrollProgress = 0;
            targetScroll = 0;
            fitView();
            diveHomeX = viewX;
            diveHomeY = viewY;
            diveTrack.classList.add('visible');
            mainCanvas.classList.add('dive-mode');
            diveHintShown = false;
            diveHint.classList.add('visible');
        }

        function exitDiveMode() {
            diveMode = false;
            diveTrack.classList.remove('visible');
            diveHint.classList.remove('visible');
            mainCanvas.classList.remove('dive-mode');
        }

        function toggleDiveMode() {
            if (diveMode) exitDiveMode();
            else enterDiveMode();
        }

        resetBtn.addEventListener('click', function() {
            if (diveMode) { targetScroll = 0; viewX = diveHomeX; viewY = diveHomeY; }
            else fitView();
        });

        // ---- Rendering ----
        function renderExplore() {
            var w = mainCanvas.width;
            var h = mainCanvas.height;
            var dpr = devicePixelRatio;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            ctx.setTransform(viewZoom * dpr, 0, 0, viewZoom * dpr, viewX * dpr, viewY * dpr);

            // White canvas background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            var sorted = layers.slice().sort(function(a, b) { return a.zIndex - b.zIndex; });
            for (var i = 0; i < sorted.length; i++) {
                var layer = sorted[i];
                if (!layer.visible) continue;
                var processed = getProcessedCanvas(layer);
                if (!processed) continue;

                var img = images[layer.id] || transparentImages[layer.id];
                if (!img) continue;

                ctx.save();
                ctx.globalAlpha = layer.opacity;
                var drawW = img.naturalWidth * layer.scale;
                var drawH = img.naturalHeight * layer.scale;

                if (layer.scale > 1.5) {
                    ctx.filter = 'blur(' + (layer.scale * 0.7).toFixed(1) + 'px)';
                }

                if (layer.rotation) {
                    var cx = layer.x + drawW / 2;
                    var cy = layer.y + drawH / 2;
                    ctx.translate(cx, cy);
                    ctx.rotate(layer.rotation * Math.PI / 180);
                    ctx.drawImage(processed, -drawW / 2, -drawH / 2, drawW, drawH);
                } else {
                    ctx.drawImage(processed, layer.x, layer.y, drawW, drawH);
                }
                ctx.restore();
            }
        }

        function renderDive() {
            var w = mainCanvas.width;
            var h = mainCanvas.height;
            var dpr = devicePixelRatio;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // Base transform uses home position (no user pan)
            ctx.setTransform(viewZoom * dpr, 0, 0, viewZoom * dpr, diveHomeX * dpr, diveHomeY * dpr);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            var centerX = CANVAS_W / 2;
            var centerY = CANVAS_H / 2;

            // Pan offset in canvas units — closer layers shift more
            var panCX = (viewX - diveHomeX) / viewZoom;
            var panCY = (viewY - diveHomeY) / viewZoom;

            // Draw back-to-front (diveSorted is top-first, so reverse)
            for (var i = diveSorted.length - 1; i >= 0; i--) {
                var layer = diveSorted[i];

                // Each layer sits at depth (i+1). Camera at scrollProgress.
                var layerZ = i + 1;
                var relZ = layerZ - scrollProgress;

                if (relZ <= 0.05) continue; // behind camera

                var processed = getProcessedCanvas(layer);
                if (!processed) continue;

                var img = images[layer.id] || transparentImages[layer.id];
                if (!img) continue;

                // Perspective: closer layers scale up, normalized so
                // at scroll=0 every layer has scaleMultiplier=1
                var scaleMultiplier = layerZ / relZ;

                var opacity = layer.opacity;
                if (relZ < 0.4) {
                    opacity *= relZ / 0.4;
                }

                ctx.save();
                ctx.globalAlpha = opacity;

                // Perspective zoom from center + parallax pan
                ctx.translate(centerX + panCX * scaleMultiplier, centerY + panCY * scaleMultiplier);
                ctx.scale(scaleMultiplier, scaleMultiplier);
                ctx.translate(-centerX, -centerY);

                var drawW = img.naturalWidth * layer.scale;
                var drawH = img.naturalHeight * layer.scale;

                if (layer.scale * scaleMultiplier > 1.5) {
                    ctx.filter = 'blur(' + (layer.scale * scaleMultiplier * 0.7).toFixed(1) + 'px)';
                }

                if (layer.rotation) {
                    var cx = layer.x + drawW / 2;
                    var cy = layer.y + drawH / 2;
                    ctx.translate(cx, cy);
                    ctx.rotate(layer.rotation * Math.PI / 180);
                    ctx.drawImage(processed, -drawW / 2, -drawH / 2, drawW, drawH);
                } else {
                    ctx.drawImage(processed, layer.x, layer.y, drawW, drawH);
                }
                ctx.restore();
            }
        }

        function render() {
            if (diveMode) { renderDive(); return; }
            renderExplore();
        }

        function renderLoop() {
            if (diveMode) {
                scrollProgress += (targetScroll - scrollProgress) * SCROLL_LERP;
                var maxScroll = diveLayerCount;
                var pct = maxScroll > 0 ? Math.max(0, Math.min(1, scrollProgress / maxScroll)) : 0;
                divePip.style.top = (pct * 100) + '%';

                if (!diveHintShown && Math.abs(targetScroll) > 0.05) {
                    diveHintShown = true;
                    diveHint.classList.remove('visible');
                }
            }
            render();
            requestAnimationFrame(renderLoop);
        }

        // ---- Interaction ----
        mainCanvas.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            isPanning = true;
            panStartX = e.clientX; panStartY = e.clientY;
            panStartViewX = viewX; panStartViewY = viewY;
            mainCanvas.classList.add('panning');
        });

        window.addEventListener('mousemove', function(e) {
            if (!isPanning) return;
            viewX = panStartViewX + (e.clientX - panStartX);
            viewY = panStartViewY + (e.clientY - panStartY);
        });

        window.addEventListener('mouseup', function() {
            isPanning = false;
            mainCanvas.classList.remove('panning');
        });

        mainCanvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (diveMode) {
                if (e.ctrlKey) {
                    // Pinch-to-zoom in dive mode
                    var mx = e.clientX, my = e.clientY;
                    var zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
                    var newZoom = Math.max(0.002, Math.min(10, viewZoom * zoomFactor));
                    var r = newZoom / viewZoom;
                    viewX = mx - (mx - viewX) * r;
                    viewY = my - (my - viewY) * r;
                    diveHomeX = mx - (mx - diveHomeX) * r;
                    diveHomeY = my - (my - diveHomeY) * r;
                    viewZoom = newZoom;
                } else {
                    // Regular scroll drives dive depth
                    targetScroll = Math.max(0, Math.min(diveLayerCount, targetScroll + e.deltaY * SCROLL_SENSITIVITY));
                }
                return;
            }
            var mx = e.clientX;
            var my = e.clientY;
            var zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            var newZoom = Math.max(0.002, Math.min(10, viewZoom * zoomFactor));
            viewX = mx - (mx - viewX) * (newZoom / viewZoom);
            viewY = my - (my - viewY) * (newZoom / viewZoom);
            viewZoom = newZoom;
        }, { passive: false });

        // Touch: pan and pinch-zoom
        mainCanvas.addEventListener('touchstart', function(e) {
            if (diveMode) {
                if (e.touches.length === 1) {
                    diveTouchLastY = e.touches[0].clientY;
                }
                return;
            }
            if (e.touches.length === 1) {
                isPanning = true;
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
                panStartViewX = viewX;
                panStartViewY = viewY;
            } else if (e.touches.length === 2) {
                isPanning = false;
                var dx = e.touches[1].clientX - e.touches[0].clientX;
                var dy = e.touches[1].clientY - e.touches[0].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                lastTouchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                lastTouchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
        }, { passive: true });

        mainCanvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (diveMode) {
                if (e.touches.length === 1) {
                    var deltaY = diveTouchLastY - e.touches[0].clientY;
                    diveTouchLastY = e.touches[0].clientY;
                    targetScroll = Math.max(0, Math.min(diveLayerCount, targetScroll + deltaY * TOUCH_SENSITIVITY));
                }
                return;
            }
            if (e.touches.length === 1 && isPanning) {
                viewX = panStartViewX + (e.touches[0].clientX - panStartX);
                viewY = panStartViewY + (e.touches[0].clientY - panStartY);
            } else if (e.touches.length === 2) {
                var dx = e.touches[1].clientX - e.touches[0].clientX;
                var dy = e.touches[1].clientY - e.touches[0].clientY;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                if (lastTouchDist > 0) {
                    var scale = dist / lastTouchDist;
                    var newZoom = Math.max(0.002, Math.min(10, viewZoom * scale));
                    viewX = midX - (midX - viewX) * (newZoom / viewZoom);
                    viewY = midY - (midY - viewY) * (newZoom / viewZoom);
                    viewZoom = newZoom;
                }

                // Pan with two fingers
                viewX += midX - lastTouchMidX;
                viewY += midY - lastTouchMidY;

                lastTouchDist = dist;
                lastTouchMidX = midX;
                lastTouchMidY = midY;
            }
        }, { passive: false });

        mainCanvas.addEventListener('touchend', function() {
            if (diveMode) { diveTouchLastY = 0; return; }
            isPanning = false;
            lastTouchDist = 0;
        }, { passive: true });

        // Double-click to reset view
        mainCanvas.addEventListener('dblclick', function() {
            if (diveMode) { targetScroll = 0; viewX = diveHomeX; viewY = diveHomeY; return; }
            fitView();
        });

        window.addEventListener('resize', function() {
            resizeCanvas();
            if (diveMode) {
                fitView();
                diveHomeX = viewX;
                diveHomeY = viewY;
            }
        });

        // Keyboard controls
        window.addEventListener('keydown', function(e) {
            if (e.key === 'j' || e.key === 'J') {
                toggleDiveMode();
                return;
            }
            if (!diveMode) return;
            if (e.key === 'Escape') {
                exitDiveMode();
            } else if (e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                targetScroll = Math.min(diveLayerCount, targetScroll + 0.5);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                targetScroll = Math.max(0, targetScroll - 0.5);
            } else if (e.key === 'Home') {
                targetScroll = 0;
            } else if (e.key === 'End') {
                targetScroll = diveLayerCount;
            }
        });

        // ---- Load and start ----
        function loadImage(src) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.onload = function() { resolve(img); };
                img.onerror = function() { resolve(null); };
                img.src = src;
            });
        }

        function init() {
            resizeCanvas();

            fetch('/api/composition').then(function(resp) {
                if (!resp.ok) return null;
                return resp.json();
            }).then(function(data) {
                if (!data || !data.layers || !data.layers.length) {
                    loadingOverlay.classList.add('hidden');
                    var empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.textContent = 'No composition published yet';
                    document.body.appendChild(empty);
                    return;
                }

                layers = data.layers;
                var total = layers.length;
                var loaded = 0;

                function tick() {
                    loaded++;
                    progressFill.style.width = (loaded / total * 100) + '%';
                    progressText.textContent = loaded + ' / ' + total;
                }

                var promises = layers.map(function(layer) {
                    var src = layer.uploaded ? ('/' + layer.filename) : ('originals/' + layer.filename);
                    return loadImage(src).then(function(img) {
                        if (img) images[layer.id] = img;
                        tick();
                    });
                });

                Promise.all(promises).then(function() {
                    // Load transparent PNGs in background for ai-mode layers (non-uploaded only)
                    layers.forEach(function(layer) {
                        if (layer.uploaded) return;
                        var pngName = layer.filename.replace('.jpg', '.png');
                        var img = new Image();
                        img.onload = function() {
                            transparentImages[layer.id] = img;
                            delete processedCanvases[layer.id];
                        };
                        img.src = 'transparent/' + pngName;
                    });

                    loadingOverlay.classList.add('hidden');
                    fitView();
                    renderLoop();
                });
            }).catch(function() {
                loadingOverlay.classList.add('hidden');
                var empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'Failed to load composition';
                document.body.appendChild(empty);
            });
        }

        init();
    })();
    </script>
</body>
</html>
