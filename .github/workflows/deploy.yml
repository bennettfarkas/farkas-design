name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site files
        run: |
          mkdir _site
          cp -r index.html CNAME shared clients _site/
          if [ -d projects ]; then
            for dir in projects/*/; do
              name=$(basename "$dir" | sed 's/^[0-9]\{6\}-//')
              cp -r "$dir" "_site/$name"
            done
          fi
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
