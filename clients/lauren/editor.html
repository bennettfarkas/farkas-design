<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauren Compositor</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e0e0e0; font-size: 13px; }

        /* Top bar */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            height: 40px; padding: 0 12px; background: #222; border-bottom: 1px solid #333;
        }
        .topbar-left { display: flex; gap: 8px; }
        .topbar-right { font-weight: 600; color: #888; letter-spacing: 0.5px; font-size: 12px; text-transform: uppercase; }
        .topbar button {
            padding: 4px 12px; border: 1px solid #444; border-radius: 4px;
            background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 12px;
        }
        .topbar button:hover { background: #333; border-color: #555; }
        .topbar button.add-layer { border-color: #4a9eff55; color: #4a9eff; }
        .topbar button.add-layer:hover { background: #4a9eff22; border-color: #4a9eff88; }
        .topbar button.publish { border-color: #3a8a4a; color: #5cb85c; }
        .topbar button.publish:hover { background: #2a5a2a; border-color: #4a9a5a; }
        .topbar button.publish.publishing { color: #888; cursor: wait; }
        .topbar button.publish.published { border-color: #5cb85c; color: #5cb85c; background: #2a5a2a; }

        /* Main layout */
        .main { display: flex; height: calc(100% - 40px); }

        /* Sidebar */
        .sidebar {
            width: 280px; min-width: 280px; background: #1e1e1e;
            border-right: 1px solid #333; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 8px 12px; font-size: 11px; font-weight: 600; color: #666;
            text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a2a;
        }
        .layer-list { flex: 1; overflow-y: auto; }
        .layer-item {
            display: flex; align-items: center; gap: 8px; padding: 6px 12px;
            border-bottom: 1px solid #252525; cursor: pointer; user-select: none;
        }
        .layer-item:hover { background: #252525; }
        .layer-item.selected { background: #2a3a4a; }
        .layer-item.hidden-layer { opacity: 0.4; }
        .layer-thumb {
            width: 36px; height: 28px; border-radius: 3px; border: 1px solid #333;
            object-fit: cover; flex-shrink: 0; background: #111;
        }
        .layer-eye {
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            border-radius: 3px; font-size: 14px; flex-shrink: 0;
        }
        .layer-eye:hover { background: #333; }
        .layer-info { flex: 1; min-width: 0; }
        .layer-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .layer-dims { font-size: 10px; color: #666; }
        .layer-name-input {
            width: 100%; border: 1px solid #4a9eff; border-radius: 2px;
            background: #1a1a1a; color: #ddd; font-size: 12px; padding: 1px 4px;
            outline: none; font-family: inherit;
        }
        .layer-opacity {
            width: 50px; height: 4px; -webkit-appearance: none; appearance: none;
            background: #333; border-radius: 2px; outline: none; flex-shrink: 0;
        }
        .layer-opacity::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            background: #888; border-radius: 50%; cursor: pointer;
        }
        .layer-opacity::-webkit-slider-thumb:hover { background: #aaa; }
        .layer-item.drag-over-above { box-shadow: inset 0 2px 0 #4a9eff; }
        .layer-item.drag-over-below { box-shadow: inset 0 -2px 0 #4a9eff; }
        .layer-item.dragging-row { opacity: 0.3; }

        /* Canvas area */
        .canvas-area {
            flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .canvas-wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
        .canvas-wrap.dragging-layer { cursor: move; }
        .canvas-wrap.panning { cursor: grabbing; }
        canvas { position: absolute; top: 0; left: 0; }

        /* Bottom panel */
        .bottom-panel {
            height: 44px; background: #222; border-top: 1px solid #333;
            display: flex; align-items: center; gap: 16px; padding: 0 16px; font-size: 12px;
        }
        .bottom-panel.empty { justify-content: center; color: #555; }
        .param-group { display: flex; align-items: center; gap: 4px; }
        .param-group label { color: #888; font-size: 11px; }
        .param-group input[type="number"] {
            width: 64px; padding: 2px 6px; border: 1px solid #444; border-radius: 3px;
            background: #2a2a2a; color: #ddd; font-size: 12px; font-family: ui-monospace, monospace;
        }
        .param-group input[type="range"] { width: 80px; }
        .param-group select {
            padding: 2px 6px; border: 1px solid #444; border-radius: 3px;
            background: #2a2a2a; color: #ddd; font-size: 12px;
        }
        .bottom-sep { width: 1px; height: 20px; background: #333; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed; inset: 0; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; gap: 16px;
        }
        .loading-overlay.hidden { display: none; }
        .progress-bar { width: 300px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #5a9; border-radius: 3px; transition: width 0.2s; width: 0; }
        .progress-text { color: #888; font-size: 13px; }

        /* Zoom display */
        .zoom-display {
            position: absolute; bottom: 52px; right: 12px;
            background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px;
            font-size: 11px; color: #aaa; pointer-events: none;
        }

        /* Scrollbar */
        .layer-list::-webkit-scrollbar { width: 6px; }
        .layer-list::-webkit-scrollbar-track { background: transparent; }
        .layer-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* JSON modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 500;
        }
        .modal-overlay.hidden { display: none; }
        .modal {
            background: #222; border: 1px solid #444; border-radius: 8px;
            padding: 20px; width: 600px; max-height: 80vh; display: flex; flex-direction: column; gap: 12px;
        }
        .modal h3 { font-size: 14px; color: #ccc; }
        .modal textarea {
            width: 100%; height: 300px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 4px; color: #ddd; font-family: ui-monospace, monospace; font-size: 11px;
            padding: 8px; resize: vertical;
        }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-actions button {
            padding: 6px 16px; border: 1px solid #444; border-radius: 4px;
            background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 12px;
        }
        .modal-actions button.primary { background: #3a6a4a; border-color: #4a8a5a; }
        .modal-actions button:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div style="font-size: 16px; color: #ccc;">Loading layers...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0 / 25</div>
    </div>

    <!-- JSON modal -->
    <div class="modal-overlay hidden" id="jsonModal">
        <div class="modal">
            <h3>composition.json</h3>
            <textarea id="jsonTextarea" spellcheck="false"></textarea>
            <div class="modal-actions">
                <button id="btnCopy">Copy</button>
                <button id="btnCloseModal">Close</button>
            </div>
        </div>
    </div>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <button id="btnSave">Save JSON &#x2193;</button>
            <button id="btnLoadTrigger">Load JSON</button>
            <input type="file" id="loadInput" accept=".json" style="display:none">
            <button id="btnView">View JSON</button>
            <button id="btnReset">Reset</button>
            <button class="publish" id="btnPublish">Publish</button>
            <button class="add-layer" id="btnAddLayer">Add Layer +</button>
            <input type="file" id="imageInput" accept=".jpg,.jpeg,.png,.webp" style="display:none">
        </div>
        <div class="topbar-right">Lauren Compositor</div>
    </div>

    <!-- Main layout -->
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">Layers <span id="layerCount"></span></div>
            <div class="layer-list" id="layerList"></div>
        </div>
        <div class="canvas-area">
            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="mainCanvas"></canvas>
            </div>
            <div class="zoom-display" id="zoomDisplay">100%</div>
            <div class="bottom-panel empty" id="bottomPanel">Select a layer</div>

    </div>

        { id: "14", filename: "14-8F1B5158-466D-488B-B9C3-63C8124915FE.jpg", visible: true,  opacity: 1.0, x: 12876, y: 8070,  scale: 0.535,   threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 4 },

        { id: "12", filename: "12-F6682304-45B3-4529-92F5-9E0A32C27375.jpg", visible: true,  opacity: 1.0, x: 11188, y: 3000,  scale: 1.7393,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 9 },

        { id: "13", filename: "13-37669304-16E6-43D5-A5BB-B11B6247F8CC.jpg", visible: true,  opacity: 1.0, x: 12880, y: 7904,  scale: 0.6334,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 17 },
        { id: "17", filename: "17-6AC02502-CC74-40B9-91ED-188C1BD5FCCC.jpg", visible: true,  opacity: 1.0, x: 12958, y: 7478,  scale: 0.599,   threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 18 },
        { id: "2",  filename: "2-F5BBB7EF-1959-4AD4-927A-5D022E25B27A.jpg",  visible: true,  opacity: 1.0, x: 11198, y: 5526,  scale: 3.1199,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 19 },
        { id: "18", filename: "18-35C1393B-1712-4973-B1EB-5A132F19780A.jpg", visible: true,  opacity: 1.0, x: 9430,  y: 7004,  scale: 2.9569,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 20 },
        { id: "16", filename: "16-4614F665-9B32-4736-8A64-B3BB039D75FF.jpg", visible: true,  opacity: 1.0, x: 13470, y: 7940,  scale: 0.2683,  threshold: 200, bgColor: [255,255,255], bgMode: "ai",        zIndex: 21 },
        { id: "25", filename: "25-IMG_5181.jpg",                              visible: true,  opacity: 1.0, x: 13652, y: 8214,  scale: 0.0597,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 22 },
        { id: "24", filename: "24-IMG_1577.jpg",                              visible: true,  opacity: 1.0, x: 11974, y: 5654,  scale: 1.5542,  threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 23 },
        { id: "21", filename: "21-6BEA37AA-9CF5-4849-889B-58E5C0DDD875.jpg", visible: false, opacity: 1.0, x: 0,     y: 0,     scale: 1.0,     threshold: 200, bgColor: [255,255,255], bgMode: "threshold", zIndex: 24 }
    ];

    function ensureLayerDefaults(layer) {
        if (!layer.name) layer.name = 'Layer ' + layer.id;
        if (layer.rotation === undefined) layer.rotation = 0;
        if (layer.feather === undefined) layer.feather = 0;
        if (layer.uploaded === undefined) layer.uploaded = false;
    }
    DEFAULT_LAYERS.forEach(ensureLayerDefaults);

    // ==========================================================================
    // STATE
    // ==========================================================================
    var layers = [];
    var selectedLayerId = null;
    var images = {};           // id -> HTMLImageElement (original JPEGs)
    var transparentImages = {}; // id -> HTMLImageElement (pre-processed PNGs)
    var processedCanvases = {}; // id -> { canvas, threshold, bgMode, feather }
    var thumbnails = {};       // id -> data URL string

    // Viewport
    var viewX = 0, viewY = 0, viewZoom = 0.04;

    // Interaction
    var isPanning = false, isDragging = false, isRotating = false, isResizing = false;
    var spaceDown = false;
    var dragStartX = 0, dragStartY = 0, dragLayerStartX = 0, dragLayerStartY = 0;
    var panStartX = 0, panStartY = 0, panStartViewX = 0, panStartViewY = 0;
    var rotateStartAngle = 0, rotateStartRotation = 0, rotateCenterX = 0, rotateCenterY = 0;
    var resizeStartDist = 0, resizeStartScale = 0, resizeCenterX = 0, resizeCenterY = 0;
    var reorderDragId = null; // layer id being dragged in sidebar

    // DOM
    var mainCanvas = document.getElementById('mainCanvas');
    var ctx = mainCanvas.getContext('2d');
    var canvasWrap = document.getElementById('canvasWrap');
    var layerListEl = document.getElementById('layerList');
    var bottomPanel = document.getElementById('bottomPanel');
    var zoomDisplay = document.getElementById('zoomDisplay');
    var loadingOverlay = document.getElementById('loadingOverlay');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');

    var MAX_PREVIEW_DIM = 2000;

    // ==========================================================================
    // UNDO / REDO
    // ==========================================================================
    var undoStack = [];
    var redoStack = [];
    var MAX_UNDO = 80;

    function snapshotLayers() {
        return JSON.stringify(layers.map(function(l) {
            return { id: l.id, filename: l.filename, name: l.name, visible: l.visible, opacity: l.opacity,
                x: l.x, y: l.y, scale: l.scale, rotation: l.rotation, threshold: l.threshold,
                feather: l.feather, bgColor: l.bgColor, bgMode: l.bgMode, zIndex: l.zIndex,
                uploaded: l.uploaded || false };
        }));
    }

    function pushUndo() {
        var snap = snapshotLayers();
        if (undoStack.length && undoStack[undoStack.length - 1] === snap) return;
        undoStack.push(snap);
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack.length = 0;
    }

    function restoreSnapshot(snap) {
        var parsed = JSON.parse(snap);
        // Check which processed canvases need invalidation
        parsed.forEach(function(s) {
            var existing = layers.find(function(l) { return l.id === s.id; });
            if (existing && (existing.threshold !== s.threshold || existing.bgMode !== s.bgMode || (existing.feather || 0) !== (s.feather || 0))) {
                invalidateProcessedCanvas(s.id);
            }
        });
        // Replace full layers array (handles add/remove from uploads)
        layers = parsed;
        layers.forEach(ensureLayerDefaults);
        if (selectedLayerId && !layers.find(function(l) { return l.id === selectedLayerId; })) {
            selectedLayerId = null;
        }
        buildLayerList();
        updateBottomPanel();
    }

    function undo() {
        if (!undoStack.length) return;
        redoStack.push(snapshotLayers());
        restoreSnapshot(undoStack.pop());
    }

    function redo() {
        if (!redoStack.length) return;
        undoStack.push(snapshotLayers());
        restoreSnapshot(redoStack.pop());
    }

    // ==========================================================================
    // INIT
    // ==========================================================================
    function init() {
        loadComposition().then(function(loaded) {
            layers = loaded || JSON.parse(JSON.stringify(DEFAULT_LAYERS));
            layers.forEach(ensureLayerDefaults);
            return loadAllImages();
        }).then(function() {
            loadingOverlay.classList.add('hidden');
            fitView();
            buildLayerList();
            resizeCanvas();
            requestAnimationFrame(renderLoop);
        });
    }

    function loadComposition() {
        return fetch('/api/composition').then(function(resp) {
            if (!resp.ok) return null;
            return resp.json();
        }).then(function(data) {
            if (data && data.version && data.layers) return data.layers;
            return null;
        }).catch(function() { return null; });
    }

    function generateThumbnail(id) {
        var img = images[id];
        if (!img) return;
        var c = document.createElement('canvas');
        c.width = 36;
        c.height = 28;
        var tctx = c.getContext('2d');
        var s = Math.max(36 / img.naturalWidth, 28 / img.naturalHeight);
        var sw = img.naturalWidth * s;
        var sh = img.naturalHeight * s;
        tctx.drawImage(img, (36 - sw) / 2, (28 - sh) / 2, sw, sh);
        thumbnails[id] = c.toDataURL('image/jpeg', 0.6);
    }

    function loadAllImages() {
        var total = layers.length;
        var loaded = 0;

        var promises = layers.map(function(layer) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.onload = function() {
                    images[layer.id] = img;
                    generateThumbnail(layer.id);
                    loaded++;
                    progressFill.style.width = (loaded / total * 100) + '%';
                    progressText.textContent = loaded + ' / ' + total;
                    resolve();
                };
                img.onerror = function() {
                    loaded++;
                    progressFill.style.width = (loaded / total * 100) + '%';
                    progressText.textContent = loaded + ' / ' + total;
                    resolve();
                };
                img.src = layer.uploaded ? ('/' + layer.filename) : ('originals/' + layer.filename);
            });
        });

        return Promise.all(promises).then(function() {
            // Load transparent PNGs in background for ai mode (non-uploaded only)
            layers.forEach(function(layer) {
                if (layer.uploaded) return;
                var pngName = layer.filename.replace('.jpg', '.png');
                var img = new Image();
                img.onload = function() {
                    transparentImages[layer.id] = img;
                    invalidateProcessedCanvas(layer.id);
                };
                img.src = 'transparent/' + pngName;
            });
        });
    }

    // ==========================================================================
    // IMAGE PROCESSING
    // ==========================================================================
    function getProcessedCanvas(layer) {
        var cached = processedCanvases[layer.id];
        if (cached && cached.threshold === layer.threshold && cached.bgMode === layer.bgMode && cached.feather === (layer.feather || 0)) {
            return cached.canvas;
        }

        var srcImg;
        if (layer.bgMode === 'ai' && transparentImages[layer.id]) {
            srcImg = transparentImages[layer.id];
        } else {
            srcImg = images[layer.id];
        }
        if (!srcImg) return null;

        var w = srcImg.naturalWidth, h = srcImg.naturalHeight;
        var downscaleRatio = 1;
        if (Math.max(w, h) > MAX_PREVIEW_DIM) {
            downscaleRatio = MAX_PREVIEW_DIM / Math.max(w, h);
            w = Math.round(w * downscaleRatio);
            h = Math.round(h * downscaleRatio);
        }

        var offscreen = document.createElement('canvas');
        offscreen.width = w;
        offscreen.height = h;
        var octx = offscreen.getContext('2d');
        octx.drawImage(srcImg, 0, 0, w, h);

        var needPixelOps = (layer.bgMode === 'threshold') || ((layer.feather || 0) > 0);
        if (needPixelOps) {
            var imageData = octx.getImageData(0, 0, w, h);
            var data = imageData.data;

            // Threshold bg removal
            if (layer.bgMode === 'threshold') {
                var bg = layer.bgColor || [255, 255, 255];
                var thresh = layer.threshold;
                for (var i = 0; i < data.length; i += 4) {
                    var dr = data[i] - bg[0];
                    var dg = data[i+1] - bg[1];
                    var db = data[i+2] - bg[2];
                    var dist = Math.sqrt(dr*dr + dg*dg + db*db);
                    if (dist < thresh) {
                        var alpha = dist < thresh * 0.6 ? 0 : Math.round(255 * (dist - thresh * 0.6) / (thresh * 0.4));
                        data[i+3] = alpha;
                    }
                }
            }

            // Edge feathering
            var feather = layer.feather || 0;
            if (feather > 0) {
                var effectiveFeather = feather * (w / srcImg.naturalWidth);
                if (effectiveFeather > 0.5) {
                    for (var j = 0; j < data.length; j += 4) {
                        var px = (j / 4) % w;
                        var py = Math.floor((j / 4) / w);
                        var edgeDist = Math.min(px, py, w - 1 - px, h - 1 - py);
                        if (edgeDist < effectiveFeather) {
                            data[j+3] = Math.round(data[j+3] * (edgeDist / effectiveFeather));
                        }
                    }
                }
            }

            octx.putImageData(imageData, 0, 0);
        }

        processedCanvases[layer.id] = { canvas: offscreen, threshold: layer.threshold, bgMode: layer.bgMode, feather: layer.feather || 0 };
        return offscreen;
    }

    function invalidateProcessedCanvas(id) {
        delete processedCanvases[id];
    }

    // ==========================================================================
    // RENDERING
    // ==========================================================================
    function resizeCanvas() {
        var rect = canvasWrap.getBoundingClientRect();
        mainCanvas.width = rect.width * devicePixelRatio;
        mainCanvas.height = rect.height * devicePixelRatio;
        mainCanvas.style.width = rect.width + 'px';
        mainCanvas.style.height = rect.height + 'px';
    }

    function renderLoop() {
        render();
        requestAnimationFrame(renderLoop);
    }

    function render() {
        var w = mainCanvas.width;
        var h = mainCanvas.height;
        var dpr = devicePixelRatio;

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(0, 0, w, h);

        ctx.setTransform(viewZoom * dpr, 0, 0, viewZoom * dpr, viewX * dpr, viewY * dpr);

        // Canvas bounds (white)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        // Layers sorted by zIndex
        var sorted = layers.slice().sort(function(a, b) { return a.zIndex - b.zIndex; });
        for (var i = 0; i < sorted.length; i++) {
            var layer = sorted[i];
            if (!layer.visible) continue;
            var processed = getProcessedCanvas(layer);
            if (!processed) continue;

            var img = images[layer.id] || transparentImages[layer.id];
            if (!img) continue;

            ctx.save();
            ctx.globalAlpha = layer.opacity;
            var drawW = img.naturalWidth * layer.scale;
            var drawH = img.naturalHeight * layer.scale;

            // Soft-focus blur for upscaled layers
            // Each source pixel spans layer.scale canvas units;
            // blur ~0.7 of a source pixel to hide the upscale grid
            if (layer.scale > 1.5) {
                ctx.filter = 'blur(' + (layer.scale * 0.7).toFixed(1) + 'px)';
            }

            if (layer.rotation) {
                var cx = layer.x + drawW / 2;
                var cy = layer.y + drawH / 2;
                ctx.translate(cx, cy);
                ctx.rotate(layer.rotation * Math.PI / 180);
                ctx.drawImage(processed, -drawW / 2, -drawH / 2, drawW, drawH);
            } else {
                ctx.drawImage(processed, layer.x, layer.y, drawW, drawH);
            }
            ctx.restore();
        }

        // Selection box
        if (selectedLayerId) {
            var sel = layers.find(function(l) { return l.id === selectedLayerId; });
            if (sel && sel.visible) {
                var selImg = images[sel.id];
                if (selImg) {
                    var sw = selImg.naturalWidth * sel.scale;
                    var sh = selImg.naturalHeight * sel.scale;
                    var scx = sel.x + sw / 2;
                    var scy = sel.y + sh / 2;

                    ctx.save();
                    ctx.translate(scx, scy);
                    ctx.rotate((sel.rotation || 0) * Math.PI / 180);

                    // Dashed rect
                    ctx.strokeStyle = '#4a9eff';
                    ctx.lineWidth = 2 / viewZoom;
                    ctx.setLineDash([6 / viewZoom, 4 / viewZoom]);
                    ctx.strokeRect(-sw / 2, -sh / 2, sw, sh);
                    ctx.setLineDash([]);

                    // Corner handles
                    var hs = 6 / viewZoom;
                    ctx.fillStyle = '#4a9eff';
                    var corners = [[-sw/2, -sh/2], [sw/2, -sh/2], [-sw/2, sh/2], [sw/2, sh/2]];
                    for (var c = 0; c < corners.length; c++) {
                        ctx.fillRect(corners[c][0] - hs/2, corners[c][1] - hs/2, hs, hs);
                    }

                    // Rotation handle — line from top center up
                    var rotOffset = 30 / viewZoom;
                    ctx.beginPath();
                    ctx.moveTo(0, -sh / 2);
                    ctx.lineTo(0, -sh / 2 - rotOffset);
                    ctx.strokeStyle = '#4a9eff';
                    ctx.lineWidth = 1.5 / viewZoom;
                    ctx.stroke();

                    // Rotation handle — circle
                    ctx.beginPath();
                    ctx.arc(0, -sh / 2 - rotOffset, 4 / viewZoom, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.strokeStyle = '#4a9eff';
                    ctx.lineWidth = 1.5 / viewZoom;
                    ctx.stroke();

                    ctx.restore();
                }
            }
        }

        zoomDisplay.textContent = Math.round(viewZoom * 100) + '%';
    }

    function fitView() {
        var rect = canvasWrap.getBoundingClientRect();
        var scaleX = rect.width / CANVAS_W;
        var scaleY = rect.height / CANVAS_H;
        viewZoom = Math.min(scaleX, scaleY) * 0.9;
        viewX = (rect.width - CANVAS_W * viewZoom) / 2;
        viewY = (rect.height - CANVAS_H * viewZoom) / 2;
    }

    // ==========================================================================
    // SIDEBAR
    // ==========================================================================
    function buildLayerList() {
        var sorted = layers.slice().sort(function(a, b) { return b.zIndex - a.zIndex; });
        while (layerListEl.firstChild) layerListEl.removeChild(layerListEl.firstChild);
        document.getElementById('layerCount').textContent = '(' + layers.length + ')';

        sorted.forEach(function(layer) {
            var el = document.createElement('div');
            el.className = 'layer-item';
            if (layer.id === selectedLayerId) el.className += ' selected';
            if (!layer.visible) el.className += ' hidden-layer';
            el.dataset.id = layer.id;

            // Thumbnail
            if (thumbnails[layer.id]) {
                var thumbImg = document.createElement('img');
                thumbImg.className = 'layer-thumb';
                thumbImg.src = thumbnails[layer.id];
                el.appendChild(thumbImg);
            }

            // Eye toggle
            var eye = document.createElement('span');
            eye.className = 'layer-eye';
            eye.textContent = layer.visible ? '\uD83D\uDC41' : '\u25CB';
            eye.addEventListener('click', function(e) {
                e.stopPropagation();
                pushUndo();
                layer.visible = !layer.visible;
                buildLayerList();
                updateBottomPanel();
            });

            // Info
            var info = document.createElement('div');
            info.className = 'layer-info';

            var name = document.createElement('div');
            name.className = 'layer-name';
            name.textContent = layer.name;

            // Double-click to rename
            name.addEventListener('dblclick', function(e) {
                e.stopPropagation();
                var input = document.createElement('input');
                input.type = 'text';
                input.className = 'layer-name-input';
                input.value = layer.name;

                function confirmRename() {
                    var newName = input.value.trim();
                    if (newName && newName !== layer.name) {
                        pushUndo();
                        layer.name = newName;
                    }
                    buildLayerList();
                    updateBottomPanel();
                }

                input.addEventListener('blur', confirmRename);
                input.addEventListener('keydown', function(ev) {
                    ev.stopPropagation();
                    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                    if (ev.key === 'Escape') {
                        ev.preventDefault();
                        input.removeEventListener('blur', confirmRename);
                        buildLayerList();
                    }
                });

                name.textContent = '';
                name.appendChild(input);
                input.focus();
                input.select();
            });

            var dims = document.createElement('div');
            dims.className = 'layer-dims';
            var img = images[layer.id];
            dims.textContent = (img ? img.naturalWidth + '\u00D7' + img.naturalHeight : '') + ' \u00B7 z' + layer.zIndex;

            info.appendChild(name);
            info.appendChild(dims);

            // Opacity slider
            var slider = document.createElement('input');
            slider.type = 'range';
            slider.className = 'layer-opacity';
            slider.min = '0';
            slider.max = '1';
            slider.step = '0.01';
            slider.value = String(layer.opacity);
            (function(lyr) {
                var opacityUndoPushed = false;
                slider.addEventListener('mousedown', function() { pushUndo(); opacityUndoPushed = true; });
                slider.addEventListener('input', function(e) {
                    e.stopPropagation();
                    lyr.opacity = parseFloat(e.target.value);
                });
                slider.addEventListener('change', function() { opacityUndoPushed = false; });
            })(layer);
            slider.addEventListener('click', function(e) { e.stopPropagation(); });

            // Click to select
            el.addEventListener('click', function() {
                selectedLayerId = layer.id;
                buildLayerList();
                updateBottomPanel();
            });

            // Drag-to-reorder
            el.draggable = true;
            el.addEventListener('dragstart', function(e) {
                reorderDragId = layer.id;
                el.classList.add('dragging-row');
                e.dataTransfer.effectAllowed = 'move';
            });
            el.addEventListener('dragend', function() {
                reorderDragId = null;
                el.classList.remove('dragging-row');
                // Clean up indicators
                var items = layerListEl.querySelectorAll('.layer-item');
                for (var k = 0; k < items.length; k++) {
                    items[k].classList.remove('drag-over-above', 'drag-over-below');
                }
            });
            el.addEventListener('dragover', function(e) {
                if (!reorderDragId || reorderDragId === layer.id) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                var rect = el.getBoundingClientRect();
                var midY = rect.top + rect.height / 2;
                // Clean up sibling indicators
                var items = layerListEl.querySelectorAll('.layer-item');
                for (var k = 0; k < items.length; k++) {
                    items[k].classList.remove('drag-over-above', 'drag-over-below');
                }
                if (e.clientY < midY) {
                    el.classList.add('drag-over-above');
                } else {
                    el.classList.add('drag-over-below');
                }
            });
            el.addEventListener('dragleave', function() {
                el.classList.remove('drag-over-above', 'drag-over-below');
            });
            el.addEventListener('drop', function(e) {
                e.preventDefault();
                if (!reorderDragId || reorderDragId === layer.id) return;
                pushUndo();

                // Sidebar is sorted high-zIndex first (top of list = front)
                // Build the current visual order
                var visualOrder = layers.slice().sort(function(a, b) { return b.zIndex - a.zIndex; });
                var dragIdx = -1, dropIdx = -1;
                for (var k = 0; k < visualOrder.length; k++) {
                    if (visualOrder[k].id === reorderDragId) dragIdx = k;
                    if (visualOrder[k].id === layer.id) dropIdx = k;
                }
                if (dragIdx < 0 || dropIdx < 0) return;

                // Remove dragged item
                var moved = visualOrder.splice(dragIdx, 1)[0];
                // Recalculate dropIdx after removal
                dropIdx = -1;
                for (var k = 0; k < visualOrder.length; k++) {
                    if (visualOrder[k].id === layer.id) { dropIdx = k; break; }
                }

                // Insert above or below based on mouse position
                var rect = el.getBoundingClientRect();
                var insertIdx = e.clientY < rect.top + rect.height / 2 ? dropIdx : dropIdx + 1;
                visualOrder.splice(insertIdx, 0, moved);

                // Reassign zIndex: first in visual order = highest zIndex
                for (var k = 0; k < visualOrder.length; k++) {
                    visualOrder[k].zIndex = visualOrder.length - 1 - k;
                }

                reorderDragId = null;
                buildLayerList();
                updateBottomPanel();
            });

            el.appendChild(eye);
            el.appendChild(info);
            el.appendChild(slider);
            layerListEl.appendChild(el);
        });
    }

    function updateBottomPanel() {
        var layer = layers.find(function(l) { return l.id === selectedLayerId; });
        while (bottomPanel.firstChild) bottomPanel.removeChild(bottomPanel.firstChild);

        if (!layer) {
            bottomPanel.className = 'bottom-panel empty';
            bottomPanel.textContent = 'Select a layer';
            return;
        }

        bottomPanel.className = 'bottom-panel';

        // Name label
        var label = document.createElement('strong');
        label.style.color = '#4a9eff';
        label.textContent = layer.name;
        bottomPanel.appendChild(label);
        bottomPanel.appendChild(makeSep());

        // X
        bottomPanel.appendChild(makeNumberParam('X', Math.round(layer.x), function(v) { layer.x = v; }));
        // Y
        bottomPanel.appendChild(makeNumberParam('Y', Math.round(layer.y), function(v) { layer.y = v; }));
        // Scale
        bottomPanel.appendChild(makeNumberParam('Scale', layer.scale, function(v) { layer.scale = v; }, 0.01, 4));
        // Rotation
        bottomPanel.appendChild(makeNumberParam('Rot', Math.round(layer.rotation * 10) / 10, function(v) { layer.rotation = v; }, 1, 1));
        bottomPanel.appendChild(makeSep());

        // Threshold
        var threshGroup = document.createElement('div');
        threshGroup.className = 'param-group';
        var threshLabel = document.createElement('label');
        threshLabel.textContent = 'Threshold';
        var threshSlider = document.createElement('input');
        threshSlider.type = 'range';
        threshSlider.min = '0';
        threshSlider.max = '442';
        threshSlider.value = String(layer.threshold);
        threshSlider.style.width = '100px';
        var threshVal = document.createElement('span');
        threshVal.style.cssText = 'color:#888;min-width:28px';
        threshVal.textContent = String(layer.threshold);
        var threshUndoPushed = false;
        threshSlider.addEventListener('mousedown', function() { if (!threshUndoPushed) { pushUndo(); threshUndoPushed = true; } });
        threshSlider.addEventListener('input', function(e) {
            layer.threshold = parseInt(e.target.value, 10);
            threshVal.textContent = String(layer.threshold);
            invalidateProcessedCanvas(layer.id);
        });
        threshSlider.addEventListener('change', function() { threshUndoPushed = false; });
        threshGroup.appendChild(threshLabel);
        threshGroup.appendChild(threshSlider);
        threshGroup.appendChild(threshVal);
        bottomPanel.appendChild(threshGroup);

        // Feather
        var featherGroup = document.createElement('div');
        featherGroup.className = 'param-group';
        var featherLabel = document.createElement('label');
        featherLabel.textContent = 'Feather';
        var featherSlider = document.createElement('input');
        featherSlider.type = 'range';
        featherSlider.min = '0';
        featherSlider.max = '200';
        featherSlider.value = String(layer.feather || 0);
        featherSlider.style.width = '80px';
        var featherVal = document.createElement('span');
        featherVal.style.cssText = 'color:#888;min-width:28px';
        featherVal.textContent = String(layer.feather || 0);
        var featherUndoPushed = false;
        featherSlider.addEventListener('mousedown', function() { if (!featherUndoPushed) { pushUndo(); featherUndoPushed = true; } });
        featherSlider.addEventListener('input', function(e) {
            layer.feather = parseInt(e.target.value, 10);
            featherVal.textContent = String(layer.feather);
            invalidateProcessedCanvas(layer.id);
        });
        featherSlider.addEventListener('change', function() { featherUndoPushed = false; });
        featherGroup.appendChild(featherLabel);
        featherGroup.appendChild(featherSlider);
        featherGroup.appendChild(featherVal);
        bottomPanel.appendChild(featherGroup);
        bottomPanel.appendChild(makeSep());

        // bgMode
        var bgGroup = document.createElement('div');
        bgGroup.className = 'param-group';
        var bgLabel = document.createElement('label');
        bgLabel.textContent = 'BG';
        var bgSelect = document.createElement('select');
        ['threshold', 'ai', 'none'].forEach(function(mode) {
            var opt = document.createElement('option');
            opt.value = mode;
            opt.textContent = mode === 'ai' ? 'AI (rembg)' : mode.charAt(0).toUpperCase() + mode.slice(1);
            if (layer.bgMode === mode) opt.selected = true;
            bgSelect.appendChild(opt);
        });
        bgSelect.addEventListener('change', function(e) {
            pushUndo();
            layer.bgMode = e.target.value;
            invalidateProcessedCanvas(layer.id);
        });
        bgGroup.appendChild(bgLabel);
        bgGroup.appendChild(bgSelect);
        bottomPanel.appendChild(bgGroup);
    }

    function makeNumberParam(labelText, value, onChange, step, decimals) {
        var group = document.createElement('div');
        group.className = 'param-group';
        var lbl = document.createElement('label');
        lbl.textContent = labelText;
        var input = document.createElement('input');
        input.type = 'number';
        input.value = decimals ? value.toFixed(decimals) : String(value);
        if (step) input.step = String(step);
        input.addEventListener('change', function(e) {
            var v = parseFloat(e.target.value);
            if (!isNaN(v)) { pushUndo(); onChange(v); }
        });
        group.appendChild(lbl);
        group.appendChild(input);
        return group;
    }

    function makeSep() {
        var sep = document.createElement('div');
        sep.className = 'bottom-sep';
        return sep;
    }

    // ==========================================================================
    // CANVAS INTERACTION
    // ==========================================================================
    function screenToCanvas(sx, sy) {
        return { x: (sx - viewX) / viewZoom, y: (sy - viewY) / viewZoom };
    }

    // Transform a canvas-space point into a layer's local coordinate space
    // Returns { x, y } relative to layer center, plus halfW/halfH
    function canvasToLocal(canvasX, canvasY, layer) {
        var img = images[layer.id];
        if (!img) return null;
        var w = img.naturalWidth * layer.scale;
        var h = img.naturalHeight * layer.scale;
        var centerX = layer.x + w / 2;
        var centerY = layer.y + h / 2;
        var rad = -(layer.rotation || 0) * Math.PI / 180;
        var dx = canvasX - centerX;
        var dy = canvasY - centerY;
        return {
            x: dx * Math.cos(rad) - dy * Math.sin(rad),
            y: dx * Math.sin(rad) + dy * Math.cos(rad),
            halfW: w / 2,
            halfH: h / 2
        };
    }

    canvasWrap.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        var rect = canvasWrap.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;

        if (spaceDown) {
            isPanning = true;
            panStartX = e.clientX; panStartY = e.clientY;
            panStartViewX = viewX; panStartViewY = viewY;
            canvasWrap.classList.add('panning');
            return;
        }

        var pt = screenToCanvas(sx, sy);

        // If a layer is selected, check handles and body
        if (selectedLayerId) {
            var sel = layers.find(function(l) { return l.id === selectedLayerId; });
            if (sel && sel.visible && images[sel.id]) {
                var local = canvasToLocal(pt.x, pt.y, sel);
                if (local) {
                    var handleDist = 10 / viewZoom;
                    var rotOffset = 30 / viewZoom;

                    // Rotation handle
                    if (Math.abs(local.x) < handleDist && Math.abs(local.y - (-local.halfH - rotOffset)) < handleDist) {
                        pushUndo();
                        isRotating = true;
                        var img = images[sel.id];
                        var w = img.naturalWidth * sel.scale;
                        var h = img.naturalHeight * sel.scale;
                        rotateCenterX = sel.x + w / 2;
                        rotateCenterY = sel.y + h / 2;
                        rotateStartAngle = Math.atan2(pt.y - rotateCenterY, pt.x - rotateCenterX);
                        rotateStartRotation = sel.rotation || 0;
                        return;
                    }

                    // Corner resize handles
                    var cornerPositions = [
                        { x: -local.halfW, y: -local.halfH },
                        { x:  local.halfW, y: -local.halfH },
                        { x: -local.halfW, y:  local.halfH },
                        { x:  local.halfW, y:  local.halfH }
                    ];
                    for (var c = 0; c < cornerPositions.length; c++) {
                        if (Math.abs(local.x - cornerPositions[c].x) < handleDist && Math.abs(local.y - cornerPositions[c].y) < handleDist) {
                            pushUndo();
                            isResizing = true;
                            resizeStartDist = Math.sqrt(local.x * local.x + local.y * local.y);
                            resizeStartScale = sel.scale;
                            var img2 = images[sel.id];
                            var w2 = img2.naturalWidth * sel.scale;
                            var h2 = img2.naturalHeight * sel.scale;
                            resizeCenterX = sel.x + w2 / 2;
                            resizeCenterY = sel.y + h2 / 2;
                            return;
                        }
                    }

                    // Layer body — drag to move
                    if (Math.abs(local.x) <= local.halfW && Math.abs(local.y) <= local.halfH) {
                        pushUndo();
                        isDragging = true;
                        dragStartX = pt.x; dragStartY = pt.y;
                        dragLayerStartX = sel.x; dragLayerStartY = sel.y;
                        canvasWrap.classList.add('dragging-layer');
                        return;
                    }
                }
            }
        }

        // Nothing hit — pan
        isPanning = true;
        panStartX = e.clientX; panStartY = e.clientY;
        panStartViewX = viewX; panStartViewY = viewY;
        canvasWrap.classList.add('panning');
    });

    window.addEventListener('mousemove', function(e) {
        if (isPanning) {
            viewX = panStartViewX + (e.clientX - panStartX);
            viewY = panStartViewY + (e.clientY - panStartY);
        }
        if (isDragging && selectedLayerId) {
            var rect = canvasWrap.getBoundingClientRect();
            var pt = screenToCanvas(e.clientX - rect.left, e.clientY - rect.top);
            var layer = layers.find(function(l) { return l.id === selectedLayerId; });
            if (layer) {
                layer.x = dragLayerStartX + (pt.x - dragStartX);
                layer.y = dragLayerStartY + (pt.y - dragStartY);
                updateBottomPanel();
            }
        }
        if (isRotating && selectedLayerId) {
            var rect = canvasWrap.getBoundingClientRect();
            var pt = screenToCanvas(e.clientX - rect.left, e.clientY - rect.top);
            var angle = Math.atan2(pt.y - rotateCenterY, pt.x - rotateCenterX);
            var delta = (angle - rotateStartAngle) * 180 / Math.PI;
            var layer = layers.find(function(l) { return l.id === selectedLayerId; });
            if (layer) {
                layer.rotation = rotateStartRotation + delta;
                updateBottomPanel();
            }
        }
        if (isResizing && selectedLayerId) {
            var rect = canvasWrap.getBoundingClientRect();
            var pt = screenToCanvas(e.clientX - rect.left, e.clientY - rect.top);
            var layer = layers.find(function(l) { return l.id === selectedLayerId; });
            if (layer && images[layer.id] && resizeStartDist > 0) {
                var dist = Math.sqrt(Math.pow(pt.x - resizeCenterX, 2) + Math.pow(pt.y - resizeCenterY, 2));
                var ratio = dist / resizeStartDist;
                layer.scale = Math.max(0.001, resizeStartScale * ratio);
                // Keep center stable
                var img = images[layer.id];
                var newW = img.naturalWidth * layer.scale;
                var newH = img.naturalHeight * layer.scale;
                layer.x = resizeCenterX - newW / 2;
                layer.y = resizeCenterY - newH / 2;
                updateBottomPanel();
            }
        }
    });

    window.addEventListener('mouseup', function() {
        isPanning = false;
        isDragging = false;
        isRotating = false;
        isResizing = false;
        canvasWrap.classList.remove('panning', 'dragging-layer');
    });

    canvasWrap.addEventListener('wheel', function(e) {
        e.preventDefault();
        var rect = canvasWrap.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        var zoomFactor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        var newZoom = Math.max(0.002, Math.min(10, viewZoom * zoomFactor));
        viewX = mx - (mx - viewX) * (newZoom / viewZoom);
        viewY = my - (my - viewY) * (newZoom / viewZoom);
        viewZoom = newZoom;
    }, { passive: false });

    window.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.code === 'KeyZ') {
            e.preventDefault();
            if (e.shiftKey) { redo(); } else { undo(); }
            return;
        }
        if (e.code === 'Space' && !e.repeat) {
            e.preventDefault();
            spaceDown = true;
            canvasWrap.style.cursor = 'grab';
        }
        if (e.code === 'Escape' && document.activeElement.tagName !== 'INPUT') {
            selectedLayerId = null;
            buildLayerList();
            updateBottomPanel();
        }
        if (e.code === 'KeyF' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            fitView();
        }
    });

    window.addEventListener('keyup', function(e) {
        if (e.code === 'Space') {
            spaceDown = false;
            canvasWrap.style.cursor = '';
        }
    });

    window.addEventListener('resize', resizeCanvas);

    // ==========================================================================
    // SAVE / LOAD
    // ==========================================================================
    function getCompositionJson() {
        return JSON.stringify({
            version: 1,
            canvas: { width: CANVAS_W, height: CANVAS_H },
            layers: layers.map(function(l) {
                return {
                    id: l.id, filename: l.filename, name: l.name,
                    visible: l.visible, opacity: l.opacity,
                    x: Math.round(l.x * 100) / 100, y: Math.round(l.y * 100) / 100,
                    scale: Math.round(l.scale * 10000) / 10000,
                    rotation: Math.round((l.rotation || 0) * 100) / 100,
                    feather: l.feather || 0,
                    threshold: l.threshold, bgColor: l.bgColor, bgMode: l.bgMode, zIndex: l.zIndex,
                    uploaded: l.uploaded || false
                };
            })
        }, null, 2);
    }

    function saveJson() {
        var json = getCompositionJson();
        var blob = new Blob([json], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'composition.json'; a.click();
        URL.revokeObjectURL(url);
    }

    function showJson() {
        document.getElementById('jsonTextarea').value = getCompositionJson();
        document.getElementById('jsonModal').classList.remove('hidden');
    }

    function loadJsonFile(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = JSON.parse(e.target.result);
                if (data.layers) {
                    layers = data.layers;
                    layers.forEach(ensureLayerDefaults);
                    processedCanvases = {};
                    selectedLayerId = null;
                    buildLayerList();
                    updateBottomPanel();
                }
            } catch (err) {
                alert('Invalid JSON: ' + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function resetToDefaults() {
        if (!confirm('Reset all layers to default positions?')) return;
        layers = JSON.parse(JSON.stringify(DEFAULT_LAYERS));
        layers.forEach(ensureLayerDefaults);
        processedCanvases = {};
        selectedLayerId = null;
        buildLayerList();
        updateBottomPanel();
        fitView();
    }

    // ==========================================================================
    // UPLOAD
    // ==========================================================================
    function handleUploadImage(event) {
        var file = event.target.files[0];
        if (!file) return;

        // Upload to R2 first
        var token = getPublishToken();
        if (!token) { event.target.value = ''; return; }

        var formData = new FormData();
        formData.append('file', file);

        fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        }).then(function(resp) {
            if (!resp.ok) throw new Error('Upload failed (status ' + resp.status + ')');
            return resp.json();
        }).then(function(result) {
            var objectUrl = URL.createObjectURL(file);
            var img = new Image();
            img.onload = function() {
                var maxId = 0;
                layers.forEach(function(l) {
                    var n = parseInt(l.id, 10);
                    if (!isNaN(n) && n > maxId) maxId = n;
                });
                var newId = String(maxId + 1);
                var maxZ = 0;
                layers.forEach(function(l) { if (l.zIndex > maxZ) maxZ = l.zIndex; });

                var newLayer = {
                    id: newId,
                    filename: result.key,
                    name: file.name.replace(/\.[^.]+$/, ''),
                    visible: true,
                    opacity: 1.0,
                    x: CANVAS_W / 2 - img.naturalWidth / 2,
                    y: CANVAS_H / 2 - img.naturalHeight / 2,
                    scale: 1.0,
                    rotation: 0,
                    feather: 0,
                    threshold: 200,
                    bgColor: [255, 255, 255],
                    bgMode: 'none',
                    zIndex: maxZ + 1,
                    uploaded: true
                };

                pushUndo();
                layers.push(newLayer);
                images[newId] = img;
                generateThumbnail(newId);
                selectedLayerId = newId;
                buildLayerList();
                updateBottomPanel();
            };
            img.src = objectUrl;
        }).catch(function(err) {
            alert('Upload failed: ' + err.message);
        });

        event.target.value = '';
    }

    // ==========================================================================
    // AUTH + PUBLISH
    // ==========================================================================
    function getPublishToken() {
        var token = localStorage.getItem('lauren-publish-token');
        if (!token) {
            token = prompt('Enter publish token:');
            if (token) localStorage.setItem('lauren-publish-token', token);
        }
        return token;
    }

    function publish() {
        var token = getPublishToken();
        if (!token) return;

        var btn = document.getElementById('btnPublish');
        btn.textContent = 'Publishing...';
        btn.classList.add('publishing');

        fetch('/api/publish', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: getCompositionJson()
        }).then(function(resp) {
            if (resp.status === 401) {
                localStorage.removeItem('lauren-publish-token');
                throw new Error('Invalid token');
            }
            if (!resp.ok) throw new Error('Publish failed (status ' + resp.status + ')');
            return resp.json();
        }).then(function() {
            btn.textContent = 'Published!';
            btn.classList.remove('publishing');
            btn.classList.add('published');
            setTimeout(function() {
                btn.textContent = 'Publish';
                btn.classList.remove('published');
            }, 2000);
        }).catch(function(err) {
            btn.textContent = 'Publish';
            btn.classList.remove('publishing');
            alert('Publish failed: ' + err.message);
        });
    }

    // ==========================================================================
    // WIRE UP BUTTONS
    // ==========================================================================
    document.getElementById('btnSave').addEventListener('click', saveJson);
    document.getElementById('btnLoadTrigger').addEventListener('click', function() {
        document.getElementById('loadInput').click();
    });
    document.getElementById('loadInput').addEventListener('change', loadJsonFile);
    document.getElementById('btnView').addEventListener('click', showJson);
    document.getElementById('btnReset').addEventListener('click', resetToDefaults);
    document.getElementById('btnPublish').addEventListener('click', publish);
    document.getElementById('btnAddLayer').addEventListener('click', function() {
        document.getElementById('imageInput').click();
    });
    document.getElementById('imageInput').addEventListener('change', handleUploadImage);
    document.getElementById('btnCopy').addEventListener('click', function() {
        var ta = document.getElementById('jsonTextarea');
        ta.select();
        navigator.clipboard.writeText(ta.value);
    });
    document.getElementById('btnCloseModal').addEventListener('click', function() {
        document.getElementById('jsonModal').classList.add('hidden');
    });

    // ==========================================================================
    // START
    // ==========================================================================
    init();
    </script>
</body>
</html>
