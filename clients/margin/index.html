    <style>
        .back[aria-hidden] { visibility: hidden; }

        /* ── Navigation list ── */
        .nav-list {
            max-width: calc(clamp(80px, 14vw, 120px) * 4.88 + 5rem);
            padding: 0 2.5rem;
            margin-top: clamp(2rem, 5vw, 3.5rem);
        }

        .nav-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 1.25rem;
            padding: 1.5rem 0;
            border-top: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: color 0.15s ease;
        }

        [data-theme="dark"] .nav-row {
            border-color: rgba(196, 253, 164, 0.08);
        }

        .nav-row:last-child {
            border-bottom: 1px solid var(--border);
        }

        [data-theme="dark"] .nav-row:last-child {
            border-color: rgba(196, 253, 164, 0.08);
        }

        .nav-row:hover .nav-name,
        .nav-row:hover .nav-chevron {
            color: var(--spring-600);
        }

        [data-theme="dark"] .nav-row:hover .nav-name,
        [data-theme="dark"] .nav-row:hover .nav-chevron {
            color: var(--spring-400);
        }

        .nav-row:hover .nav-chevron {
            transform: translateX(3px);
        }

        /* Row text */
        .nav-text {
            min-width: 0;
        }

        .nav-name {
            font-family: var(--font-sans);
            font-weight: var(--weight-semibold);
            font-size: var(--text-h3);
            color: var(--color-heading);
            line-height: var(--leading-h3);
            transition: color 0.15s ease;
        }

        [data-theme="dark"] .nav-name {
            color: var(--spring-100);
        }

        .nav-mono {
            font-family: var(--font-mono);
            font-size: var(--text-meta);
            font-weight: var(--weight-regular);
            color: var(--color-muted);
            letter-spacing: 0.02em;
            white-space: nowrap;
            margin-right: 0.5rem;
        }

        .nav-chevron {
            color: var(--color-muted);
            transition: color 0.15s ease, transform 0.15s ease;
            flex-shrink: 0;
        }

        .nav-chevron svg {
            width: 16px;
            height: 16px;
        }

        /* ── Ending mark ── */
        .ending-mark {
            padding: 0 2.5rem;
            margin-top: clamp(3rem, 8vw, 5rem);
        }

        .ending-mark svg {
            height: 28px;
            width: auto;
            color: var(--color-muted);
        }

        /* ── Entrance animation ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-row {
            animation: fadeIn 0.4s ease both;
        }

        .nav-row:nth-child(1) { animation-delay: 0s; }
        .nav-row:nth-child(2) { animation-delay: 0.06s; }
        .nav-row:nth-child(3) { animation-delay: 0.12s; }
        .nav-row:nth-child(4) { animation-delay: 0.18s; }

        .ending-mark {
            animation: fadeIn 0.4s ease both;
            animation-delay: 0.28s;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .nav-list { max-width: calc(clamp(80px, 14vw, 120px) * 4.88 + 3rem); padding: 0 1.5rem; }
            .nav-row {
                grid-template-columns: 1fr auto;
                gap: 1rem;
            }
            .nav-mono { display: none; }
            .ending-mark { padding: 0 1.5rem; }
        }
    </style>
    <script>(function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
